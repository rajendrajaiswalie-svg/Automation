# Test Configuration Properties
# Place this file in src/test/resources/

# WireMock Configuration
wiremock.port=8080
wiremock.dynamic.port=true
wiremock.record.mode=false

# API Configuration
api.base.url=http://localhost:8080
api.timeout.ms=5000
api.retry.attempts=3
api.retry.delay.ms=1000

# Test Data
test.user.id=1
test.user.name=John Doe
test.user.email=john@example.com

# Logging
logging.level=INFO
logging.level.wiremock=DEBUG

# Test Execution
test.parallel.enabled=false
test.thread.count=4
test.timeout.seconds=30
